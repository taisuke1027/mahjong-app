          <div class="record-header-card__info">${players.length}人 / ${rule && rule.gameType === "yonma" ? "四人麻雀" : "三人麻雀"}</div>
        </div>
        <button class="btn-inline" id="session-finish-btn">対局を終了</button>
      </div>

      <div class="participant-row">${participantsHtml}</div>

      <div class="game-tab-strip">${tabsHtml}
        ${activeGame ? `
          <div class="game-tab-actions">
            <button class="row-icon-btn" id="game-duplicate-btn" title="複製" aria-label="複製">📋</button>
            ${games.length > 1 ? `<button class="row-icon-btn" id="game-delete-btn" title="削除" aria-label="削除">🗑️</button>` : ""}
          </div>` : ""}
      </div>

      ${activeGame ? `
        <div class="card">
          ${scoreRowsHtml}
        </div>
        <div id="total-banner-container">${totalBannerHtml}</div>

        <label class="checkbox-row" style="margin: 4px 0 14px;">
          <input type="checkbox" id="west-round-checkbox" ${activeGame.isWestRound ? "checked" : ""}> この半荘は西入で終了した
        </label>

        ${!windsComplete ? `<p style="font-size:12px; color:var(--danger); margin:0 0 10px;">各プレイヤーの風（東・南・西・北）を重複なく設定してください</p>` : ""}
        <button class="btn btn-secondary" id="game-calc-btn" ${(isMatch && windsComplete) ? "" : "disabled"}>${activeGame.isFinished ? "再計算" : "計算"}</button>

        <div id="calc-results-container" style="margin-top:12px;">${resultsCardHtml}</div>

        <button class="btn btn-primary" id="game-save-btn" style="margin-top:10px;" ${canSave ? "" : "disabled"}>保存</button>
      ` : ""}
    `;

    wireRecordScreenEvents(session, activeGame, players, rule);
  }

  function buildResultsCardHtml(results, players) {
    const sorted = [...results].sort((a, b) => a.rank - b.rank);
    const rows = sorted.map(r => {
      const p = players.find(pl => pl.id === r.playerId);
      if (!p) return "";
      const breakdownParts = [`素点${r.scorePoint}`, `ウマ${r.umaPoint >= 0 ? "+" : ""}${r.umaPoint}`];
      if (r.okaPoint) breakdownParts.push(`オカ+${r.okaPoint}`);
      if (r.tobiPoint) breakdownParts.push(`飛び${r.tobiPoint >= 0 ? "+" : ""}${r.tobiPoint}`);
      return `
        <div class="result-row">
          <span class="result-row__rank ${r.rank === 1 ? "is-first" : ""}">${r.rank}</span>
          <span class="result-row__icon" style="--row-color:${p.color}"></span>
          <div style="flex:1; min-width:0;">
            <div class="result-row__name">${p.name}</div>
            <div class="result-row__breakdown">${breakdownParts.join(" / ")}</div>
          </div>
          <span class="result-row__total ${r.totalPoint > 0 ? "is-plus" : (r.totalPoint < 0 ? "is-minus" : "")}">${r.totalPoint > 0 ? "+" : ""}${r.totalPoint}</span>
        </div>
      `;
    }).join("");
    return `<div class="card">${rows}</div>`;
  }

  function wireRecordScreenEvents(session, activeGame, players, rule) {
    document.getElementById("session-finish-btn").addEventListener("click", () => {
      Dialog.confirm("対局を終了しますか？", "現在の対局セッションを終了し、ホームに戻ります。記録済みのデータは保持されます。", () => {
        SessionManager.clearCurrent();
        activeGameId = null;
        renderRecordScreen();
        UI.showScreen("home");
        document.querySelectorAll(".tab-item").forEach(el => el.classList.toggle("is-active", el.dataset.tab === "home"));
        UI.showToast("対局を終了しました", "success");
      }, { confirmLabel: "終了", danger: false });
    });

    document.querySelectorAll("[data-game-tab-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        activeGameId = btn.dataset.gameTabId;
        renderRecordScreen();
      });
    });

    document.getElementById("game-add-btn").addEventListener("click", () => {
      const newGame = GameManager.addForSession(session.id, players);
      activeGameId = newGame.id;
      renderRecordScreen();
    });

    const dupBtn = document.getElementById("game-duplicate-btn");
    if (dupBtn) dupBtn.addEventListener("click", () => {
      const copy = GameManager.duplicate(activeGameId);
      if (copy) { activeGameId = copy.id; renderRecordScreen(); UI.showToast("複製しました", "success"); }
    });

    const delBtn = document.getElementById("game-delete-btn");
    if (delBtn) delBtn.addEventListener("click", () => {
      const games = GameManager.getBySession(session.id);
      Dialog.confirm(`半荘${activeGame.gameNumber}を削除しますか？`, "この操作は元に戻すボタンで5秒以内なら取り消せます。", () => {
        const removed = GameManager.remove(activeGameId);
        lastDeletedGame = removed;
        activeGameId = null;
        renderRecordScreen();
        renderHomeRankingAndRecent();
        renderStatsScreen();
        renderHistoryScreen();
        showUndoBanner("半荘を削除しました", () => {
          if (lastDeletedGame) {
            GameManager.restore(lastDeletedGame);
            activeGameId = lastDeletedGame.id;
            lastDeletedGame = null;
            renderRecordScreen();
            renderHomeRankingAndRecent();
            renderStatsScreen();
            renderHistoryScreen();
          }
        });
      });
    });

    document.querySelectorAll("[data-wind-player-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        const playerId = btn.dataset.windPlayerId;
        const wind = btn.dataset.windValue;
        const game = GameManager.getById(activeGameId);
        const winds = (game && game.seatWinds) || {};
        // 他のプレイヤーが同じ風を持っていたら外す（入れ替え）
        Object.keys(winds).forEach(pid => {
          if (pid !== playerId && winds[pid] === wind) GameManager.setSeatWind(activeGameId, pid, null);
        });
        // 自分がすでにこの風なら解除（トグル）、そうでなければ設定
        GameManager.setSeatWind(activeGameId, playerId, winds[playerId] === wind ? null : wind);
        renderRecordScreen();
      });
    });

    document.querySelectorAll("[data-score-player-id]").forEach(input => {
      input.addEventListener("input", (e) => {
        const playerId = e.target.dataset.scorePlayerId;
        const raw = e.target.value;
        const num = raw === "" ? null : Number(raw);
        // 自動保存：即時にStorageへ反映（入力欄は再描画しないためフォーカス・入力中の値は失われない）
        GameManager.updateResult(activeGameId, playerId, Number.isFinite(num) ? num : null);
        refreshTotalsUI(players, rule);
        // 入力が変わったら、それまでの計算結果は無効化する（再計算を促す）
        if (pendingCalculation && pendingCalculation.gameId === activeGameId) {
          pendingCalculation = null;
          const resultsContainer = document.getElementById("calc-results-container");
          if (resultsContainer) resultsContainer.innerHTML = "";
          const saveBtn = document.getElementById("game-save-btn");
          if (saveBtn) saveBtn.disabled = true;
        }
        const calcBtn = document.getElementById("game-calc-btn");
        if (calcBtn) {
          const values = players.map(p => {
            const el = document.querySelector(`[data-score-player-id="${p.id}"]`);
            return el && el.value !== "" ? Number(el.value) : undefined;
          });
          const total = values.reduce((sum, v) => sum + (Number.isFinite(v) ? v : 0), 0);
          const required = rule.startPoint * players.length;
          const sumOk = values.every(v => Number.isFinite(v)) && total === required;
          const freshGame = GameManager.getById(activeGameId);
          calcBtn.disabled = !(sumOk && computeWindsComplete(freshGame, players));
        }
      });
    });

    const westCheckbox = document.getElementById("west-round-checkbox");
    if (westCheckbox) westCheckbox.addEventListener("change", (e) => {
      GameManager.setWestRound(activeGameId, e.target.checked);
    });

    const calcBtn = document.getElementById("game-calc-btn");
    if (calcBtn) calcBtn.addEventListener("click", () => runCalculation(session, activeGame, players, rule));

    const saveBtn = document.getElementById("game-save-btn");
    if (saveBtn) saveBtn.addEventListener("click", () => {
      if (!pendingCalculation || pendingCalculation.gameId !== activeGameId) return;
      GameManager.saveComputedResults(activeGameId, pendingCalculation.results, { tobi: pendingCalculation.tobi });
      pendingCalculation = null;
      renderRecordScreen();
      renderHomeRankingAndRecent();
      renderStatsScreen();
      renderHistoryScreen();
      UI.showToast("半荘を保存しました", "success");
    });
  }

  /* ===== Phase4: 点数計算フロー ===== */
  function runCalculation(session, activeGame, players, rule) {
    const finalPoints = {};
    players.forEach(p => {
      const el = document.querySelector(`[data-score-player-id="${p.id}"]`);
      finalPoints[p.id] = el && el.value !== "" ? Number(el.value) : NaN;
    });
    const playerIds = players.map(p => p.id);
    const seatWinds = (GameManager.getById(activeGame.id) || activeGame).seatWinds || {};
    const negativePlayers = players.filter(p => finalPoints[p.id] < 0);

    if (rule.tobiEnabled && negativePlayers.length > 0) {
      Dialog.open("tobi-confirm-dialog-overlay");
      const yesBtn = document.getElementById("tobi-confirm-yes");
      const noBtn = document.getElementById("tobi-confirm-no");
      const onYes = () => {
        Dialog.close("tobi-confirm-dialog-overlay");
        yesBtn.removeEventListener("click", onYes);
        noBtn.removeEventListener("click", onNo);
        openTobiSelectDialog({ players, negativePlayers, onConfirm: (tobi) => {
          finalizeCalculation({ playerIds, finalPoints, rule, seatWinds, tobi, activeGame });
        }});
      };
      const onNo = () => {
        Dialog.close("tobi-confirm-dialog-overlay");
        yesBtn.removeEventListener("click", onYes);
        noBtn.removeEventListener("click", onNo);
        finalizeCalculation({ playerIds, finalPoints, rule, seatWinds, tobi: null, activeGame });
      };
      yesBtn.addEventListener("click", onYes);
      noBtn.addEventListener("click", onNo);
    } else {
      finalizeCalculation({ playerIds, finalPoints, rule, seatWinds, tobi: null, activeGame });
    }
  }

  function openTobiSelectDialog({ players, negativePlayers, onConfirm }) {
    let bustedId = negativePlayers.length === 1 ? negativePlayers[0].id : null;
    let busterId = null;

    function renderChips() {
      const bustedRow = document.getElementById("tobi-busted-row");
      bustedRow.innerHTML = negativePlayers.map(p => `
        <button type="button" class="chip-btn ${bustedId === p.id ? "is-selected" : ""}" data-busted-id="${p.id}">${UI.colorDot(p.color)}${p.name}</button>
      `).join("");
      bustedRow.querySelectorAll("[data-busted-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          bustedId = btn.dataset.bustedId;
          if (busterId === bustedId) busterId = null;
          renderChips();
        });
      });

      const busterRow = document.getElementById("tobi-buster-row");
      const busterCandidates = players.filter(p => p.id !== bustedId);
      busterRow.innerHTML = busterCandidates.map(p => `
        <button type="button" class="chip-btn ${busterId === p.id ? "is-selected" : ""}" data-buster-id="${p.id}">${UI.colorDot(p.color)}${p.name}</button>
      `).join("");
      busterRow.querySelectorAll("[data-buster-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          busterId = btn.dataset.busterId;
          renderChips();
        });
      });

      document.getElementById("tobi-select-confirm").disabled = !(bustedId && busterId);
    }
    renderChips();
    Dialog.open("tobi-select-dialog-overlay");

    const confirmBtn = document.getElementById("tobi-select-confirm");
    const cancelBtn = document.getElementById("tobi-select-cancel");
    const onConfirmClick = () => {
      Dialog.close("tobi-select-dialog-overlay");
      confirmBtn.removeEventListener("click", onConfirmClick);
      cancelBtn.removeEventListener("click", onCancelClick);
      onConfirm({ bustedPlayerId: bustedId, busterPlayerId: busterId });
    };
    const onCancelClick = () => {
      Dialog.close("tobi-select-dialog-overlay");
      confirmBtn.removeEventListener("click", onConfirmClick);
      cancelBtn.removeEventListener("click", onCancelClick);
    };
    confirmBtn.addEventListener("click", onConfirmClick);
    cancelBtn.addEventListener("click", onCancelClick);
  }

  function finalizeCalculation({ playerIds, finalPoints, rule, seatWinds, tobi, activeGame }) {
    const result = Calculator.calculate({ playerIds, finalPoints, rule, seatWinds, tobi });
    if (!result.ok) {
      UI.showToast(result.error, "error");
      return;
    }
    pendingCalculation = { gameId: activeGame.id, results: result.results, tobi };
    renderRecordScreen();
    UI.showToast("計算しました。内容を確認して保存してください", "success");
  }

  function showUndoBanner(message, onUndo) {
    const banner = document.getElementById("undo-banner");
    document.getElementById("undo-banner-message").textContent = message;
    banner.classList.add("is-visible");
    clearTimeout(undoTimer);
    const btn = document.getElementById("undo-banner-btn");
    const handler = () => {
      onUndo();
      banner.classList.remove("is-visible");
      btn.removeEventListener("click", handler);
    };
    btn.addEventListener("click", handler);
    undoTimer = setTimeout(() => {
      banner.classList.remove("is-visible");
      btn.removeEventListener("click", handler);
      lastDeletedGame = null;
    }, 5000);
  }

  function checkRestoreOnStartup() {
    const settings = Storage.getSettings();
    if (settings.currentSessionId && SessionManager.getById(settings.currentSessionId)) {
      Dialog.open("restore-dialog-overlay");
    }
  }

  /* ===== Phase5: 成績集計 ===== */
  function renderStatsScreen() {
    document.querySelectorAll("#stats-period-segmented .segmented-btn").forEach(btn => {
      btn.classList.toggle("is-selected", btn.dataset.period === statsPeriod);
    });
    const container = document.getElementById("stats-ranking-container");
    const games = Storage.getGames();
    const sessions = SessionManager.getAllActive();
    const players = PlayerManager.getAllActive();
    const ranking = Statistics.computeRanking({ games, sessions, players, period: statsPeriod, now: new Date() });

    if (ranking.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">📊</div>
          <div class="empty-state__title">成績データがありません</div>
          <div class="empty-state__desc">対局を記録すると、成績が自動集計されます</div>
        </div>`;
      return;
    }

    container.innerHTML = ranking.map((entry, index) => {
      const p = entry.player;
      const s = entry.stats;
      return `
        <div class="ranking-row" data-ranking-player-id="${p.id}">
          <span class="ranking-row__rank ${index === 0 ? "is-first" : ""}">${index + 1}</span>
          <span class="ranking-row__icon" style="--row-color:${p.color}"></span>
          <div class="ranking-row__main">
            <div class="ranking-row__name">${p.name}</div>
            <div class="ranking-row__sub">${s.gamesCount}半荘 / 平均順位${s.avgRank.toFixed(2)}</div>
          </div>
          <span class="ranking-row__total ${s.totalPoint > 0 ? "is-plus" : (s.totalPoint < 0 ? "is-minus" : "")}">${s.totalPoint > 0 ? "+" : ""}${s.totalPoint}</span>
        </div>
      `;
    }).join("");

    container.querySelectorAll("[data-ranking-player-id]").forEach(row => {
      row.addEventListener("click", () => openPlayerDetailDialog(row.dataset.rankingPlayerId));
    });
  }

  function renderHomeRankingAndRecent() {
    const games = Storage.getGames();
    const sessions = SessionManager.getAllActive();
    const players = PlayerManager.getAllActive();

    // 最近の対局（セッション単位、新しい順に最大5件）
    const recentContainer = document.getElementById("home-recent-container");
    const recentSessions = sessions
      .map(s => ({ session: s, sessionGames: GameManager.getBySession(s.id).filter(g => g.isFinished) }))
      .filter(entry => entry.sessionGames.length > 0)
      .sort((a, b) => new Date(b.session.date) - new Date(a.session.date))
      .slice(0, 5);

    if (recentSessions.length === 0) {
      recentContainer.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">🀄</div>
          <div class="empty-state__title">まだ対局履歴がありません</div>
          <div class="empty-state__desc">「記録開始」から最初の対局を記録しましょう</div>
        </div>`;
    } else {
      recentContainer.innerHTML = `<div class="section-label">最近の対局</div>` + recentSessions.map(({ session, sessionGames }) => {
        const rule = RuleManager.getById(session.ruleId);
        const dateLabel = new Date(session.date).toLocaleDateString("ja-JP");
        return `
          <div class="card" style="padding:12px 16px; margin-bottom:8px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span style="font-weight:600; font-size:14px;">${dateLabel} ${rule ? rule.name : ""}</span>
              <span class="badge">${sessionGames.length}半荘</span>
            </div>
          </div>`;
      }).join("");
    }

    // 累計ランキング トップ3
    const rankingContainer = document.getElementById("home-ranking-container");
    const ranking = Statistics.computeRanking({ games, sessions, players, period: "all", now: new Date() }).slice(0, 3);
    if (ranking.length > 0) {
      rankingContainer.innerHTML = `<div class="section-label">累計ランキング</div>` + ranking.map((entry, index) => {
        const p = entry.player;
        const s = entry.stats;
        return `
          <div class="ranking-row" data-home-ranking-player-id="${p.id}">
            <span class="ranking-row__rank ${index === 0 ? "is-first" : ""}">${index + 1}</span>
            <span class="ranking-row__icon" style="--row-color:${p.color}"></span>
            <div class="ranking-row__main"><div class="ranking-row__name">${p.name}</div></div>
            <span class="ranking-row__total ${s.totalPoint > 0 ? "is-plus" : (s.totalPoint < 0 ? "is-minus" : "")}">${s.totalPoint > 0 ? "+" : ""}${s.totalPoint}</span>
          </div>`;
      }).join("");
      rankingContainer.querySelectorAll("[data-home-ranking-player-id]").forEach(row => {
        row.addEventListener("click", () => openPlayerDetailDialog(row.dataset.homeRankingPlayerId));
      });
    } else {
      rankingContainer.innerHTML = "";
    }
  }

  function openPlayerDetailDialog(playerId) {
    const player = PlayerManager.getById(playerId);
    if (!player) return;
    const games = Storage.getGames();
    const sessions = SessionManager.getAllActive();
    const stats = Statistics.computePlayerStats(playerId, { games, sessions, period: "all", now: new Date() });

    document.getElementById("player-detail-title").innerHTML = `${UI.colorDot(player.color)}${UI.escapeHtml(player.name)}`;
    const body = document.getElementById("player-detail-body");

    if (stats.gamesCount === 0) {
      body.innerHTML = `<div class="empty-state"><div class="empty-state__desc">まだ対局記録がありません</div></div>`;
      Dialog.open("player-detail-dialog-overlay");
      return;
    }

    const opponents = Statistics.computeOpponentStats(playerId, { games });
    const recent = Statistics.computeRecentGames(playerId, { games, sessions }, 20);

    const statCells = [
      { label: "半荘数", value: `${stats.gamesCount}半荘` },
      { label: "平均順位", value: stats.avgRank.toFixed(2) },
      { label: "合計ポイント", value: `${stats.totalPoint > 0 ? "+" : ""}${stats.totalPoint}` },
      { label: "平均素点", value: Math.round(stats.avgRawScore).toLocaleString() },
      { label: "1位率", value: `${stats.rate1.toFixed(1)}%` },
      { label: "2位率", value: `${stats.rate2.toFixed(1)}%` },
      { label: "3位率", value: `${stats.rate3.toFixed(1)}%` }
    ];
    if (stats.hasYonmaGames) statCells.push({ label: "4位率", value: `${stats.rate4.toFixed(1)}%` });

    const statGridHtml = `<div class="stat-grid">${statCells.map(c => `
      <div class="stat-cell"><div class="stat-cell__label">${c.label}</div><div class="stat-cell__value">${c.value}</div></div>
    `).join("")}</div>`;

    const recentHtml = recent.length ? recent.map(entry => {
      const rule = RuleManager.getById(entry.session.ruleId);
      const dateLabel = new Date(entry.session.date).toLocaleDateString("ja-JP");
      const tp = entry.result.totalPoint;
      return `
        <div class="mini-row">
          <span class="mini-row__label">${dateLabel} ${rule ? rule.name : ""} 半荘${entry.game.gameNumber} / ${entry.result.rank}位</span>
          <span class="mini-row__value ${tp > 0 ? "is-plus" : (tp < 0 ? "is-minus" : "")}">${tp > 0 ? "+" : ""}${tp}</span>
        </div>`;
    }).join("") : `<div style="font-size:13px; color:var(--text-sub);">記録がありません</div>`;

    const opponentHtml = opponents.length ? opponents.map(o => {
      const opponentPlayer = PlayerManager.getById(o.opponentId);
      const label = opponentPlayer ? `${UI.colorDot(opponentPlayer.color)}${UI.escapeHtml(opponentPlayer.name)}` : `${UI.escapeHtml(o.nameSnapshot)}（削除済み）`;
      return `
        <div class="mini-row">
          <span class="mini-row__label">${label}（${o.gamesTogether}戦）</span>
          <span class="mini-row__value">${o.wins}勝${o.losses}敗</span>
        </div>`;
    }).join("") : `<div style="font-size:13px; color:var(--text-sub);">対戦履歴がありません</div>`;

    body.innerHTML = `
      ${statGridHtml}
      <div class="section-label">最近の対局（最大20戦）</div>
      ${recentHtml}
      <div class="section-label">対戦相手別成績</div>
      ${opponentHtml}
    `;

    Dialog.open("player-detail-dialog-overlay");
  }

  /* ===== Phase6: 履歴編集 ===== */
  function getSessionSummary(session) {
    const rule = RuleManager.getById(session.ruleId);
    const finishedGames = GameManager.getBySession(session.id).filter(g => g.isFinished);
    const players = session.playerIds.map(id => PlayerManager.getById(id)).filter(Boolean);
    // 検索対象：日付文字列 と 参加プレイヤー名
    const dateLabel = new Date(session.date).toLocaleDateString("ja-JP");
    // ポイント順ソート用：セッション内で記録された最大の単一半荘ポイント
    let maxSinglePoint = -Infinity;
    finishedGames.forEach(g => {
      g.results.forEach(r => { if (r.totalPoint > maxSinglePoint) maxSinglePoint = r.totalPoint; });
    });
    if (finishedGames.length === 0) maxSinglePoint = -Infinity;
    return { session, rule, finishedGames, players, dateLabel, maxSinglePoint };
  }

  function renderHistoryScreen() {
    document.querySelectorAll("#history-sort-segmented .segmented-btn").forEach(btn => {
      btn.classList.toggle("is-selected", btn.dataset.sort === historySortOrder);
    });
    const container = document.getElementById("history-list");
    const sessions = SessionManager.getAllActive();
    let summaries = sessions.map(getSessionSummary).filter(s => s.finishedGames.length > 0);

    const keyword = historySearchText.trim().toLowerCase();
    if (keyword) {
      summaries = summaries.filter(s =>
        s.dateLabel.toLowerCase().includes(keyword) ||
        s.players.some(p => p.name.toLowerCase().includes(keyword))
      );
    }

    summaries.sort((a, b) => {
      if (historySortOrder === "oldest") return new Date(a.session.date) - new Date(b.session.date);
      if (historySortOrder === "points") return b.maxSinglePoint - a.maxSinglePoint;
      return new Date(b.session.date) - new Date(a.session.date); // newest（既定）
    });

    if (summaries.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">📜</div>
          <div class="empty-state__title">${keyword ? "該当する対局がありません" : "まだ対局履歴がありません"}</div>
          <div class="empty-state__desc">${keyword ? "" : "対局を記録すると、ここに一覧表示されます"}</div>
        </div>`;
      return;
    }

    container.innerHTML = summaries.map(s => `
      <div class="history-row" data-session-id="${s.session.id}">
        <div class="history-row__main">
          <div class="history-row__title">${s.dateLabel} ${s.rule ? s.rule.name : ""}</div>
          <div class="history-row__sub">${s.players.map(p => p.name).join("・")}</div>
        </div>
        <span class="badge">${s.finishedGames.length}半荘</span>
      </div>
    `).join("");

    container.querySelectorAll("[data-session-id]").forEach(row => {
      row.addEventListener("click", () => openSessionDetailDialog(row.dataset.sessionId));
    });
  }

  function openSessionDetailDialog(sessionId) {
    const summary = getSessionSummary(SessionManager.getById(sessionId));
    const { session, rule, finishedGames, players } = summary;

    document.getElementById("session-detail-title").textContent = `${summary.dateLabel} ${rule ? rule.name : ""}`;
    document.getElementById("session-detail-body").innerHTML = buildSessionDetailTableHtml(finishedGames, players);
    document.getElementById("session-detail-dialog-overlay").dataset.sessionId = sessionId;

    Dialog.open("session-detail-dialog-overlay");
  }

  function buildSessionDetailTableHtml(finishedGames, players) {
    if (finishedGames.length === 0) {
      return `<div class="empty-state"><div class="empty-state__desc">保存済みの半荘がありません</div></div>`;
    }
    const headerCells = players.map(p => `<th>${UI.colorDot(p.color)}<br>${p.name}</th>`).join("");
    const bodyRows = finishedGames.map(g => {
      const cells = players.map(p => {
        const r = g.results.find(res => res.playerId === p.id);
        const tp = r ? r.totalPoint : 0;
        return `<td class="${tp > 0 ? "is-plus" : (tp < 0 ? "is-minus" : "")}">${tp > 0 ? "+" : ""}${tp}</td>`;
      }).join("");
      return `<tr><td>半荘${g.gameNumber}</td>${cells}</tr>`;
    }).join("");
    const totalCells = players.map(p => {
      const sum = finishedGames.reduce((s, g) => {
        const r = g.results.find(res => res.playerId === p.id);
        return s + (r ? r.totalPoint : 0);
      }, 0);
      return `<td class="${sum > 0 ? "is-plus" : (sum < 0 ? "is-minus" : "")}">${sum > 0 ? "+" : ""}${sum}</td>`;
    }).join("");

    return `
      <div style="overflow-x:auto;">
        <table class="session-table">
          <thead><tr><th></th>${headerCells}</tr></thead>
          <tbody>
            ${bodyRows}
            <tr class="is-total-row"><td>合計</td>${totalCells}</tr>
          </tbody>
        </table>
      </div>
    `;
  }

  /* ===== Phase7: 共有・バックアップ ===== */
  function openSharePreview(sessionId) {
    const summary = getSessionSummary(SessionManager.getById(sessionId));
    if (summary.finishedGames.length === 0) {
      UI.showToast("保存済みの半荘がありません", "error");
      return;
    }
    UI.showLoading();
    setTimeout(() => {
      try {
        const canvas = Share.generateSessionImage({
          session: summary.session, rule: summary.rule,
          finishedGames: summary.finishedGames, players: summary.players
        });
        pendingShareCanvas = canvas;
        pendingShareBlob = null;
        pendingShareFilename = `mahjong_${Utility.formatDateForFilename(new Date(summary.session.date))}.png`;
        document.getElementById("share-preview-image").src = canvas.toDataURL("image/png");
        Dialog.open("share-preview-dialog-overlay");
        // ボタン押下時に同期的にshare()を呼べるよう、Blobは表示と並行して先に用意しておく
        Share.canvasToBlob(canvas).then(blob => { pendingShareBlob = blob; });
      } catch (e) {
        UI.showToast("画像を作成できませんでした", "error");
      } finally {
        UI.hideLoading();
      }
    }, 30);
  }

  async function handleCsvImport(files) {
    const readFile = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve({ name: file.name, text: reader.result });
      reader.onerror = () => reject(new Error(`${file.name}を読み込めませんでした`));
      reader.readAsText(file);
    });

    try {
      const contents = await Promise.all(files.map(readFile));
      const gamesFile = contents.find(f => f.name.includes("games"));
      const resultsFile = contents.find(f => f.name.includes("results"));
      const others = contents.filter(f => f !== gamesFile && f !== resultsFile);

      const outcomes = [];
      if (gamesFile) {
        outcomes.push(Import.importGamesWithResults(gamesFile.text, resultsFile ? resultsFile.text : ""));
      } else if (resultsFile) {
        outcomes.push({ ok: false, error: "results.csvはgames.csvと同時に選択してください" });
      }
      others.forEach(f => outcomes.push(Import.importCsvFile(f.name, f.text)));

      const failed = outcomes.find(o => !o.ok);
      if (failed) {
        UI.showToast(`読み込めませんでした（${failed.error}）`, "error");
        return;
      }
      refreshAllScreens();
      const total = outcomes.reduce((s, o) => s + (o.count || 0), 0);
      UI.showToast(`CSVを読み込みました（${total}件）`, "success");
    } catch (e) {
      UI.showToast(e.message || "CSVを読み込めませんでした", "error");
    }
  }

  function renderBackupStatusLabel() {
    const el = document.getElementById("backup-status-label");
    if (!el) return;
    const settings = Storage.getSettings();
    if (!settings.lastBackupAt) {
      el.textContent = "最終バックアップ：未実施";
      el.style.color = "var(--warning)";
      return;
    }
    const last = new Date(settings.lastBackupAt);
    const days = Math.floor((Date.now() - last.getTime()) / (1000 * 60 * 60 * 24));
    const dateLabel = last.toLocaleDateString("ja-JP");
    if (days >= 30) {
      el.textContent = `最終バックアップ：${dateLabel}（${days}日前）バックアップをおすすめします`;
      el.style.color = "var(--warning)";
    } else {
      el.textContent = `最終バックアップ：${dateLabel}`;
      el.style.color = "var(--text-sub)";
    }
  }

  /* インポートやデータ削除など、Storage全体が変わった後に全画面を再描画する */
  function refreshAllScreens() {
    activeGameId = null;
    pendingCalculation = null;
    UI.applyTheme(Storage.getSettings().theme);
    UI.renderPlayerList(document.getElementById("player-search").value);
    UI.renderRuleList();
    renderRecordScreen();
    renderHomeRankingAndRecent();
    renderStatsScreen();
    renderHistoryScreen();
    renderBackupStatusLabel();
    UI.setVersionLabel();
  }

  function init() {
    Storage.initializeIfNeeded();
    Storage.setErrorHandler((message) => UI.showToast(message, "error"));
    UI.setVersionLabel();

    const settings = Storage.getSettings();
    UI.applyTheme(settings.theme);

    // タブ切替
    document.querySelectorAll(".tab-item").forEach(btn => {
      btn.addEventListener("click", () => {
        UI.showScreen(btn.dataset.tab);
        if (btn.dataset.tab === "players") UI.renderPlayerList(document.getElementById("player-search").value);
        if (btn.dataset.tab === "settings") UI.renderRuleList();
        if (btn.dataset.tab === "record") renderRecordScreen();
        if (btn.dataset.tab === "stats") renderStatsScreen();
        if (btn.dataset.tab === "home") renderHomeRankingAndRecent();
        if (btn.dataset.tab === "history") renderHistoryScreen();
      });
    });
    UI.showScreen(settings.initialScreen ?? "home");

    // テーマ切替（ヘッダーアイコン）
    document.getElementById("theme-toggle").addEventListener("click", () => {
      const current = Storage.getSettings();
      const next = current.theme === "dark" ? "light" : "dark";
      current.theme = next;
      current.themeMode = "manual";
      Storage.setSettings(current);
      UI.applyTheme(next);
    });

    // テーマ切替（設定画面スイッチ）
    document.getElementById("dark-mode-switch").addEventListener("change", (e) => {
      const current = Storage.getSettings();
      const next = e.target.checked ? "dark" : "light";
      current.theme = next;
      current.themeMode = "manual";
      Storage.setSettings(current);
      UI.applyTheme(next);
    });

    /* ===== プレイヤー：一覧・検索・お気に入り ===== */
    buildPlayerPickerGrids();
    UI.renderPlayerList();

    document.getElementById("player-search").addEventListener("input", (e) => {
      UI.renderPlayerList(e.target.value);
    });

    document.getElementById("player-add-btn").addEventListener("click", () => openPlayerDialog(null));

    document.getElementById("player-list").addEventListener("click", (e) => {
      const favBtn = e.target.closest(".favorite-toggle-btn");
      if (favBtn) {
        PlayerManager.toggleFavorite(favBtn.dataset.playerId);
        UI.renderPlayerList(document.getElementById("player-search").value);
        return;
      }
      const row = e.target.closest(".list-row[data-player-id]");
      if (row) openPlayerDialog(row.dataset.playerId);
    });

    document.getElementById("player-dialog-cancel").addEventListener("click", () => Dialog.close("player-dialog-overlay"));
    document.getElementById("player-dialog-save").addEventListener("click", savePlayerDialog);
    document.getElementById("player-dialog-delete").addEventListener("click", deletePlayerFromDialog);

    /* ===== ルール：一覧・追加・編集 ===== */
    UI.renderRuleList();

    document.getElementById("rule-add-btn").addEventListener("click", () => openRuleDialog(null));
    document.getElementById("rule-list").addEventListener("click", (e) => {
      const row = e.target.closest(".list-row[data-rule-id]");
      if (row) openRuleDialog(row.dataset.ruleId);
    });
    document.querySelectorAll("#rule-gametype-segmented .segmented-btn").forEach(btn => {
      btn.addEventListener("click", () => setRuleGameType(btn.dataset.value));
    });
    document.getElementById("rule-dialog-cancel").addEventListener("click", () => Dialog.close("rule-dialog-overlay"));
    document.getElementById("rule-dialog-save").addEventListener("click", saveRuleDialog);
    document.getElementById("rule-dialog-delete").addEventListener("click", deleteRuleFromDialog);
    document.getElementById("rule-dialog-copy").addEventListener("click", duplicateRuleFromDialog);

    /* ===== 汎用確認ダイアログ ===== */
    document.getElementById("confirm-dialog-ok").addEventListener("click", () => Dialog.runPendingConfirm());
    document.getElementById("confirm-dialog-cancel").addEventListener("click", () => Dialog.close("confirm-dialog-overlay"));

    // オーバーレイの背景タップで閉じる
    document.querySelectorAll(".dialog-overlay").forEach(overlay => {
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) overlay.classList.remove("is-open");
      });
    });

    /* ===== 対局開始・記録画面（Phase3） ===== */
    document.getElementById("home-start-btn").addEventListener("click", openSessionStartDialog);
    document.querySelectorAll("#session-gametype-segmented .segmented-btn").forEach(btn => {
      btn.addEventListener("click", () => setSessionGameType(btn.dataset.value));
    });
    document.getElementById("session-start-cancel").addEventListener("click", () => Dialog.close("session-start-dialog-overlay"));
    document.getElementById("session-start-btn").addEventListener("click", startSession);
    document.getElementById("session-new-player-add").addEventListener("click", addSessionAdHocPlayer);
    document.getElementById("session-new-player-name").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); addSessionAdHocPlayer(); }
    });

    document.getElementById("restore-dialog-resume").addEventListener("click", () => {
      Dialog.close("restore-dialog-overlay");
      UI.showScreen("record");
      document.querySelectorAll(".tab-item").forEach(el => el.classList.toggle("is-active", el.dataset.tab === "record"));
      renderRecordScreen();
      UI.showToast("復元しました", "success");
    });
    document.getElementById("restore-dialog-discard").addEventListener("click", () => {
      SessionManager.clearCurrent();
      Dialog.close("restore-dialog-overlay");
      renderRecordScreen();
      UI.showToast("新規に記録を開始できます", "default");
    });

    renderRecordScreen();
    checkRestoreOnStartup();

    /* ===== Phase5: 成績 ===== */
    document.querySelectorAll("#stats-period-segmented .segmented-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        statsPeriod = btn.dataset.period;
        renderStatsScreen();
      });
    });
    document.getElementById("player-detail-close").addEventListener("click", () => Dialog.close("player-detail-dialog-overlay"));
    renderHomeRankingAndRecent();
    renderStatsScreen();

    /* ===== Phase6: 履歴編集 ===== */
    document.getElementById("history-search").addEventListener("input", (e) => {
      historySearchText = e.target.value;
      renderHistoryScreen();
    });
    document.querySelectorAll("#history-sort-segmented .segmented-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        historySortOrder = btn.dataset.sort;
        renderHistoryScreen();
      });
    });
    document.getElementById("session-detail-close").addEventListener("click", () => Dialog.close("session-detail-dialog-overlay"));
    document.getElementById("session-detail-edit").addEventListener("click", () => {
      const sessionId = document.getElementById("session-detail-dialog-overlay").dataset.sessionId;
      SessionManager.setCurrent(sessionId);
      activeGameId = null;
      pendingCalculation = null;
      Dialog.close("session-detail-dialog-overlay");
      UI.showScreen("record");
      document.querySelectorAll(".tab-item").forEach(el => el.classList.toggle("is-active", el.dataset.tab === "record"));
      renderRecordScreen();
      UI.showToast("この対局を編集できます。半荘を選んで持ち点を修正してください", "default");
    });
    document.getElementById("session-detail-delete").addEventListener("click", () => {
      const sessionId = document.getElementById("session-detail-dialog-overlay").dataset.sessionId;
      Dialog.confirm("この対局を削除しますか？", "履歴・成績集計から除外されます。", () => {
        SessionManager.remove(sessionId);
        Dialog.close("session-detail-dialog-overlay");
        renderHistoryScreen();
        renderHomeRankingAndRecent();
        renderStatsScreen();
        UI.showToast("削除しました", "success");
      });
    });
    document.getElementById("session-detail-share").addEventListener("click", () => {
      const sessionId = document.getElementById("session-detail-dialog-overlay").dataset.sessionId;
      openSharePreview(sessionId);
    });
    renderHistoryScreen();

    /* ===== Phase7: 共有・バックアップ ===== */
    document.getElementById("share-preview-cancel").addEventListener("click", () => Dialog.close("share-preview-dialog-overlay"));
    document.getElementById("share-preview-share").addEventListener("click", () => {
      if (!pendingShareCanvas) return;

      const doDownloadFallback = (blob) => {
        Utility.downloadBlob(pendingShareFilename, blob);
        Dialog.close("share-preview-dialog-overlay");
        UI.showToast("画像を保存しました。LINEアプリを開き、トークに画像を添付して送信してください", "success");
      };

      const runShare = (blob) => {
        const file = new File([blob], pendingShareFilename, { type: "image/png" });
        if (!Share.canShareFiles(file)) {
          // この端末・ブラウザは画像の共有シートに対応していないため、保存して手動送信してもらう
          doDownloadFallback(blob);
          return;
        }
        // ここでは（asyncを挟まず）クリックイベントの直後に同期的にshare()を呼ぶ。
        // 間にawaitを挟むとブラウザが「ユーザー操作」とみなさず共有シートが開かないことがあるため。
        navigator.share({ files: [file], title: pendingShareFilename })
          .then(() => {
            Dialog.close("share-preview-dialog-overlay");
            UI.showToast("共有しました", "success");
          })
          .catch((err) => {
            if (err && err.name === "AbortError") return; // ユーザーが共有シートをキャンセルしただけ
            doDownloadFallback(blob);
          });
      };

      if (pendingShareBlob) {
        runShare(pendingShareBlob);
      } else {
        // 稀にBlob生成が間に合っていない場合のみ、この場で生成してから共有する
        Share.canvasToBlob(pendingShareCanvas).then(blob => {
          pendingShareBlob = blob;
          runShare(blob);
        });
      }
    });
    document.getElementById("share-preview-save").addEventListener("click", () => {
      if (!pendingShareCanvas) return;
      const save = (blob) => {
        if (!blob) { UI.showToast("画像を作成できませんでした", "error"); return; }
        Utility.downloadBlob(pendingShareFilename, blob);
        UI.showToast("画像を保存しました", "success");
      };
      if (pendingShareBlob) save(pendingShareBlob);
      else Share.canvasToBlob(pendingShareCanvas).then(save);
    });

    renderBackupStatusLabel();

    document.getElementById("csv-export-btn").addEventListener("click", () => {
      UI.showLoading();
      setTimeout(() => {
        try {
          const count = Export.exportAllCsv();
          UI.showToast(`CSVを書き出しました（${count}ファイル）`, "success");
        } catch (e) {
          UI.showToast("CSVを書き出せませんでした", "error");
        } finally {
          UI.hideLoading();
        }
      }, 30);
    });

    document.getElementById("csv-import-btn").addEventListener("click", () => {
      document.getElementById("csv-import-input").click();
    });
    document.getElementById("csv-import-input").addEventListener("change", async (e) => {
      const files = Array.from(e.target.files || []);
      e.target.value = "";
      if (files.length === 0) return;
      Dialog.confirm("CSVを読み込みますか？", "選択したファイルの種類のデータは、現在の内容と置き換えられます。", async () => {
        UI.showLoading();
        try {
          await handleCsvImport(files);
        } finally {
          UI.hideLoading();
        }
      }, { confirmLabel: "読み込む", danger: false });
    });

    document.getElementById("json-export-btn").addEventListener("click", () => {
      UI.showLoading();
      setTimeout(() => {
        try {
          Export.exportJsonBackup();
          renderBackupStatusLabel();
          UI.showToast("バックアップを保存しました", "success");
        } catch (e) {
          UI.showToast("バックアップできませんでした", "error");
        } finally {
          UI.hideLoading();
        }
      }, 30);
    });

    document.getElementById("json-import-btn").addEventListener("click", () => {
      document.getElementById("json-import-input").click();
    });
    document.getElementById("json-import-input").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      e.target.value = "";
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        let obj;
        try {
          obj = JSON.parse(reader.result);
        } catch (err) {
          UI.showToast("復元できませんでした（JSON形式が正しくありません）", "error");
          return;
        }
        const check = Import.validateJsonBackup(obj);
        if (!check.ok) {
          UI.showToast(`復元できませんでした（${check.error}）`, "error");
          return;
        }
        Dialog.confirm("バックアップを復元しますか？", "現在のすべてのデータが、このファイルの内容で置き換えられます。", () => {
          UI.showLoading();
          setTimeout(() => {
            try {
              const result = Import.importJsonBackup(obj);
              if (result.ok) {
                refreshAllScreens();
                UI.showToast("復元しました", "success");
              } else {
                UI.showToast(`復元できませんでした（${result.error}）`, "error");
              }
            } finally {
              UI.hideLoading();
            }
          }, 30);
        }, { confirmLabel: "復元する", danger: false });
      };
      reader.onerror = () => UI.showToast("ファイルを読み込めませんでした", "error");
      reader.readAsText(file);
    });

    document.getElementById("data-delete-btn").addEventListener("click", () => {
      Dialog.confirm("すべてのデータを削除しますか？", "プレイヤー・ルール・対局履歴・設定がすべて削除されます。この操作は元に戻せません。", () => {
        [Storage.KEYS.players, Storage.KEYS.rules, Storage.KEYS.sessions, Storage.KEYS.games].forEach(key => Storage.set(key, []));
        Storage.set(Storage.KEYS.settings, Models.createDefaultSettings());
        refreshAllScreens();
        UI.showToast("すべてのデータを削除しました", "success");
      });
    });

    UI.showToast("起動しました", "success");
  }

  return { init };
})();

/* ============================================================
   予期しないエラーへの対応（第10章21節）
   個別の try/catch で拾いきれない例外はここで捕捉し、
   アプリを壊さずトーストで再読み込みを促す。
   ============================================================ */
window.addEventListener("error", (event) => {
  console.error("[Unhandled Error]", event.error || event.message);
  try {
    UI.showToast("エラーが発生しました。再読み込みしてください", "error");
  } catch (e) { /* UIすら初期化できていない場合は何もしない */ }
});
window.addEventListener("unhandledrejection", (event) => {
  console.error("[Unhandled Rejection]", event.reason);
  try {
    UI.showToast("エラーが発生しました。再読み込みしてください", "error");
  } catch (e) { /* noop */ }
});

document.addEventListener("DOMContentLoaded", Controller.init);

/* ============================================================
   PWA: Service Worker登録（第7章15節）
   file://で開いた場合やSW非対応環境ではエラーにせず静かにスキップする
   ============================================================ */
if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch((err) => {
      console.warn("Service Worker登録に失敗しました:", err);
    });
  });
}
</script>
</body>
